name: Deploy to K8s (GitOps)

# Reusable workflow — called by service CIs after a successful build.
# Updates the image tag in stellarlive-infra kustomization overlay,
# which ArgoCD detects and auto-syncs to trigger a rollout.

on:
  workflow_call:
    inputs:
      service-name:
        description: 'K8s service name (e.g. slms-control)'
        required: true
        type: string
      environment:
        description: 'Target environment overlay (testing or production)'
        required: false
        type: string
        default: 'testing'
      image-tag:
        description: 'Image tag to deploy. Defaults to the short SHA of the triggering commit.'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy on push (not PRs)
    if: github.event_name == 'push'
    steps:
      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image-tag }}" ]; then
            echo "tag=${{ inputs.image-tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout stellarlive-infra
        uses: actions/checkout@v4
        with:
          repository: BIGWISE-TEAM/stellarlive-infra
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          ref: main

      - name: Update image tag in kustomization overlay
        run: |
          OVERLAY="apps/${{ inputs.service-name }}/overlays/${{ inputs.environment }}/kustomization.yaml"

          if [ ! -f "$OVERLAY" ]; then
            echo "::error::Overlay not found: $OVERLAY"
            exit 1
          fi

          # Update the newTag for this service's image
          sed -i "s|newTag: .*|newTag: ${{ steps.tag.outputs.tag }}|" "$OVERLAY"

          echo "Updated $OVERLAY with tag: ${{ steps.tag.outputs.tag }}"
          cat "$OVERLAY"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          # Skip if nothing changed (image already at this tag)
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "deploy(${{ inputs.environment }}): ${{ inputs.service-name }} → ${{ steps.tag.outputs.tag }}

          Triggered by ${GITHUB_REPOSITORY}@${GITHUB_SHA::7}
          Workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          # Retry push up to 3 times (concurrent deploys from different services)
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push failed, retrying ($i/3)..."
            sleep $((i * 2))
          done
