name: Deploy — Update Image Tag

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Service name matching the Kustomize app directory'
        required: true
        type: string
      image-tag:
        description: 'New image tag to deploy'
        required: true
        type: string
      environment:
        description: 'Target environment (testing or production)'
        required: true
        type: string
    secrets:
      INFRA_PAT:
        description: 'PAT with repo access to stellarlive-infra'
        required: true

jobs:
  update-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: BIGWISE-TEAM/stellarlive-infra
          token: ${{ secrets.INFRA_PAT }}
          ref: main

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag
        run: |
          cd apps/${{ inputs.service-name }}/overlays/${{ inputs.environment }}
          kustomize edit set image ghcr.io/bigwise-team/${{ inputs.service-name }}=ghcr.io/bigwise-team/${{ inputs.service-name }}:${{ inputs.image-tag }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "deploy(${{ inputs.environment }}): ${{ inputs.service-name }}:${{ inputs.image-tag }}"
          git push
