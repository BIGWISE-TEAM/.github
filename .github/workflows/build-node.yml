name: Build Node.js Service

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      service-name:
        description: 'Image name for GHCR'
        required: true
        type: string
      docker-context:
        description: 'Docker build context directory'
        required: false
        type: string
        default: '.'
      dockerfile-path:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: 'Dockerfile'
      deploy:
        description: 'Auto-deploy to K8s after build (updates stellarlive-infra)'
        required: false
        type: boolean
        default: true
      deploy-environment:
        description: 'Target K8s environment (testing or production)'
        required: false
        type: string
        default: 'testing'
      build-args-from-secrets:
        description: 'Whitespace/newline-separated list of inherited secret names to forward as docker build-args (e.g. "NEXT_PUBLIC_API_URL\nNEXT_PUBLIC_SUPABASE_URL"). Each name is looked up in inherited secrets and emitted as KEY=value.'
        required: false
        type: string
        default: ''
      build-environment:
        description: 'GitHub Environment to source build-time secrets from (e.g. testing, production). Required if build-args-from-secrets references env-scoped secrets.'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ inputs.build-environment }}
    env:
      # Map every potential frontend secret into the job env. Unset secrets resolve to '' and are
      # filtered out by the Compose step below. This is the only way to bridge inherited secrets
      # into a step's dynamic context, since `secrets[name]` is not supported by GitHub Actions.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SUPABASE_NEW_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_NEW_URL }}
      NEXT_PUBLIC_SUPABASE_NEW_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_NEW_ANON_KEY }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_API_BASE: ${{ secrets.NEXT_PUBLIC_API_BASE }}
      NEXT_PUBLIC_SEND_PAGE_CONTEXT: ${{ secrets.NEXT_PUBLIC_SEND_PAGE_CONTEXT }}
      NEXT_PUBLIC_GEOLOCALIZATION_API_KEY: ${{ secrets.NEXT_PUBLIC_GEOLOCALIZATION_API_KEY }}
      NEXT_PUBLIC_AZURE_AD_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_AZURE_AD_CLIENT_ID }}
      NEXT_PUBLIC_AZURE_AD_TENANT_ID: ${{ secrets.NEXT_PUBLIC_AZURE_AD_TENANT_ID }}
      NEXT_PUBLIC_AZURE_AD_CLIENT_SECRET: ${{ secrets.NEXT_PUBLIC_AZURE_AD_CLIENT_SECRET }}
      NEXT_PUBLIC_PAYMENT_SALT: ${{ secrets.NEXT_PUBLIC_PAYMENT_SALT }}
      NEXT_PUBLIC_PAYMENT_SHARED_SECRET: ${{ secrets.NEXT_PUBLIC_PAYMENT_SHARED_SECRET }}
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/bigwise-team/${{ inputs.service-name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Compose build-args
        id: build-args
        env:
          NAMES: ${{ inputs.build-args-from-secrets }}
        run: |
          {
            echo 'value<<EOF'
            for raw in $NAMES; do
              name="$(echo "$raw" | tr -d '[:space:]')"
              [ -z "$name" ] && continue
              value="${!name-}"
              if [ -z "$value" ]; then
                echo "::warning::Secret '$name' is empty or not set — skipping build-arg"
                continue
              fi
              echo "${name}=${value}"
            done
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ steps.build-args.outputs.value }}

      # --- GitOps deploy: update image tag in stellarlive-infra ---
      - name: Generate GitHub App token
        if: inputs.deploy && github.event_name == 'push'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ARGOCD_APP_ID }}
          private-key: ${{ secrets.ARGOCD_APP_PRIVATE_KEY }}
          owner: BIGWISE-TEAM

      - name: Deploy to K8s
        if: inputs.deploy && github.event_name == 'push'
        env:
          TAG: ${{ github.sha }}
          SERVICE: ${{ inputs.service-name }}
          ENV: ${{ inputs.deploy-environment }}
          INFRA_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SHORT_SHA="${TAG::7}"
          OVERLAY="apps/${SERVICE}/overlays/${ENV}/kustomization.yaml"

          git clone --depth 1 https://x-access-token:${INFRA_TOKEN}@github.com/BIGWISE-TEAM/stellarlive-infra.git /tmp/infra
          cd /tmp/infra

          if [ ! -f "$OVERLAY" ]; then
            echo "::warning::Overlay not found: $OVERLAY — skipping deploy"
            exit 0
          fi

          sed -i "s|newTag: .*|newTag: ${SHORT_SHA}|" "$OVERLAY"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "Image already at ${SHORT_SHA}" && exit 0

          git commit -m "deploy(${ENV}): ${SERVICE} → ${SHORT_SHA}

          Source: ${GITHUB_REPOSITORY}@${SHORT_SHA}
          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Retry push ($i/3)..."
            sleep $((i * 2))
          done
          echo "::error::Failed to push after 3 retries"
          exit 1
